<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athlete Score Table</title>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 40px;
}

h1{
    text-align: center;
    margin-bottom: 30px;
}

.table-container{
    max-width: 1200px;
    margin: auto;
    overflow-x: auto;
}

table{
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
    border-radius: 12px;
    overflow: hidden;
}

thead{
    background: linear-gradient(90deg,#2563eb,#06b6d4);
}

thead th{
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

tbody tr{
    border-bottom: 1px solid #334155;
    transition: 0.3s;
}

tbody tr:hover{
    background: #334155;
}

td{
    padding: 15px;
    text-align: center;
}

.rank{
    font-weight: bold;
    color: #facc15;
}

.athlete-info{
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
}

.athlete-info img{
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
}

.best{
    font-weight: bold;
    color: #22c55e;
}

.failed{
    color: #ef4444;
    font-weight: bold;
}

.qualified{
    color: #22c55e;
    font-weight: bold;
}

</style>
</head>

<body>

<h1>🏅 Athlete Score Board</h1>

<div class="table-container">
<table>
<thead>
<tr>
    <th>Rank</th>
    <th>Athlete</th>
    <th>Country</th>
    <th>Attempt 1</th>
    <th>Attempt 2</th>
    <th>Attempt 3</th>
    <th>Best Score</th>
    <th>Status</th>
</tr>
</thead>

<tbody>
<tr>
    <td class="rank">1</td>
    <td>
        <div class="athlete-info">
            <img src="https://i.pravatar.cc/40?img=1">
            John Smith
        </div>
    </td>
    <td>USA</td>
    <td>8.5</td>
    <td>9.1</td>
    <td>9.3</td>
    <td class="best">9.3</td>
    <td class="qualified">Qualified</td>
</tr>

<tr>
    <td class="rank">2</td>
    <td>
        <div class="athlete-info">
            <img src="https://i.pravatar.cc/40?img=2">
            Hiro Tanaka
        </div>
    </td>
    <td>JPN</td>
    <td>8.7</td>
    <td>8.9</td>
    <td>9.0</td>
    <td class="best">9.0</td>
    <td class="qualified">Qualified</td>
</tr>

<tr>
    <td class="rank">3</td>
    <td>
        <div class="athlete-info">
            <img src="https://i.pravatar.cc/40?img=3">
            David Lee
        </div>
    </td>
    <td>KOR</td>
    <td>7.5</td>
    <td>8.1</td>
    <td>8.0</td>
    <td class="best">8.1</td>
    <td class="failed">Failed</td>
</tr>

</tbody>
</table>
</div>

</body>
</html>
